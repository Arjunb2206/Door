// ─── Logger ───────────────────────────────────
function log(msg, type = 'info') {
  const logEl = document.getElementById('seed-log');
  const div = document.createElement('div');
  div.className = `log-${type}`;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

window.clearLog = () => {
  document.getElementById('seed-log').innerHTML = '<span class="log-info">► Log cleared.</span>';
};

// ─── Seed Donors ──────────────────────────────
window.seedDonors = async function() {
  log('━━ Seeding 5 donor members (Devanahalli & Doddaballapur)…', 'head');
  for (const donor of DONORS) {
    try {
      const { id, ...data } = donor;
      await setDoc(doc(db, 'users', id), data);
      log(`✓ ${donor.name} · ${donor.bloodType} · ${donor.city}`, 'ok');
    } catch(e) {
      log(`✗ ${donor.name}: ${e.message}`, 'err');
    }
  }
  log(`Donors done (${DONORS.length} records written)`, 'ok');
};

// ─── Seed Blood Banks ─────────────────────────
window.seedBloodBanks = async function() {
  log('━━ Seeding blood banks…', 'head');
  for (const bank of BLOOD_BANKS) {
    try {
      const { id, ...data } = bank;
      await setDoc(doc(db, 'blood_bank', id), { ...data, updatedAt: serverTimestamp() });
      const total = Object.values(data.inventory).reduce((s,v)=>s+v,0);
      log(`✓ ${bank.bankName} · ${bank.city} · ${total} units`, 'ok');
    } catch(e) {
      log(`✗ ${bank.bankName}: ${e.message}`, 'err');
    }
  }
  log(`Blood banks done (${BLOOD_BANKS.length} records)`, 'ok');
};

// ─── Seed Hospitals ───────────────────────────
window.seedHospitals = async function() {
  log('━━ Seeding hospitals with organ availability…', 'head');
  for (const hosp of HOSPITALS) {
    try {
      const { id, ...data } = hosp;
      await setDoc(doc(db, 'hospitals', id), { ...data, updatedAt: serverTimestamp() });
      const availOrgans = Object.entries(hosp.organs).filter(([,v])=>v).map(([k])=>k).join(', ');
      log(`✓ ${hosp.name} · ${hosp.city} · Organs: ${availOrgans || 'none'}`, 'ok');
    } catch(e) {
      log(`✗ ${hosp.name}: ${e.message}`, 'err');
    }
  }
  log(`Hospitals done (${HOSPITALS.length} records)`, 'ok');
};

// ─── Seed Chat Messages ───────────────────────
window.seedChats = async function() {
  log('━━ Seeding chat messages between donors…', 'head');
  for (const chat of CHATS) {
    try {
      for (const msg of chat.messages) {
        const msgTime = new Date(Date.now() - msg.minsAgo * 60 * 1000);
        await addDoc(collection(db, 'messages', chat.roomId, 'msgs'), {
          senderId:  msg.senderId,
          text:      msg.text,
          timestamp: msgTime,
        });
      }
      log(`✓ Room ${chat.roomId} · ${chat.messages.length} messages`, 'ok');
    } catch(e) {
      log(`✗ Chat ${chat.roomId}: ${e.message}`, 'err');
    }
  }
  log(`Chats done (${CHATS.length} rooms seeded)`, 'ok');
};

// ─── Seed Requests ────────────────────────────
window.seedRequests = async function() {
  log('━━ Seeding blood & organ requests…', 'head');
  for (const req of BLOOD_REQUESTS) {
    try {
      await addDoc(collection(db, 'blood_requests'), { ...req, createdAt: serverTimestamp() });
      log(`✓ Blood req: ${req.bloodType} · ${req.urgency} · by ${req.requesterName}`, 'ok');
    } catch(e) {
      log(`✗ Blood req: ${e.message}`, 'err');
    }
  }
  for (const req of ORGAN_REQUESTS) {
    try {
      await addDoc(collection(db, 'organ_requests'), { ...req, createdAt: serverTimestamp() });
      log(`✓ Organ req: ${req.organType} · ${req.urgency} · by ${req.requesterName}`, 'ok');
    } catch(e) {
      log(`✗ Organ req: ${e.message}`, 'err');
    }
  }
  log(`Requests done`, 'ok');
};

// ─── Seed All ─────────────────────────────────
window.seedAll = async function() {
  const btn = document.getElementById('seed-all-btn');
  btn.textContent = 'Seeding…';
  btn.disabled = true;

  await seedDonors();
  await seedBloodBanks();
  await seedHospitals();
  await seedChats();
  await seedRequests();

  log('══════════════════════════════════════════', 'head');
  log('✅ All data seeded! Open the app to verify.', 'ok');
  log('══════════════════════════════════════════', 'head');

  btn.textContent = '✅ All Done!';
  setTimeout(() => {
    btn.textContent = '🌱 Seed Everything';
    btn.disabled = false;
  }, 4000);
};
