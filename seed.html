      ⚠️ <strong>Admin only.</strong> Run this once to seed your Firestore database. Make sure you've set your Firebase config in <code>firebase-db.js</code> first, and that Firestore rules allow writes.
    </div>

    <div style="display:flex;flex-direction:column;gap:0.8rem;">
      <button class="btn btn-primary btn-lg btn-full" id="seed-all-btn" onclick="seedAll()">
        🌱 Seed All Data (Blood Banks + Hospitals)
      </button>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">

        <button class="btn btn-outline" onclick="seedHospitals()">🏥 Seed Hospitals Only</button>
      </div>
      <button class="btn btn-ghost" onclick="clearLog()">🗑 Clear Log</button>
    </div>

    <div class="seed-log" id="seed-log">
      <span class="log-info">► Ready. Click a seed button to begin.</span>
    </div>
  </div>
</div>

// ─── Seeder Functions ─────────────────────────
function log(msg, type = 'info') {
  const logEl = document.getElementById('seed-log');
  const span = document.createElement('div');
  span.className = `log-${type}`;
  span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

window.clearLog = function() {
  document.getElementById('seed-log').innerHTML = '<span class="log-info">► Log cleared.</span>';
};

async function writeBloodBanks() {
  log('Seeding blood banks…', 'info');
  for (const bank of BLOOD_BANKS) {
    try {
      const { id, ...data } = bank;
      await setDoc(doc(db, 'blood_bank', id), {
        ...data,
        updatedAt: serverTimestamp(),
      });
      log(`✓ ${bank.bankName}`, 'ok');
    } catch(e) {
      log(`✗ ${bank.bankName}: ${e.message}`, 'err');
    }
  }
  log(`Blood banks done (${BLOOD_BANKS.length} records)`, 'ok');
}

async function writeHospitals() {
  log('Seeding hospitals…', 'info');
  for (const hosp of HOSPITALS) {
    try {
      const { id, ...data } = hosp;
      await setDoc(doc(db, 'hospitals', id), {
        ...data,
        updatedAt: serverTimestamp(),
      });
      log(`✓ ${hosp.name}`, 'ok');
    } catch(e) {
      log(`✗ ${hosp.name}: ${e.message}`, 'err');
    }
  }
  log(`Hospitals done (${HOSPITALS.length} records)`, 'ok');
}

window.seedBloodBanks = async function() {
  document.getElementById('seed-all-btn').disabled = true;
  await writeBloodBanks();
  document.getElementById('seed-all-btn').disabled = false;
};

window.seedHospitals = async function() {
  document.getElementById('seed-all-btn').disabled = true;
  await writeHospitals();
  document.getElementById('seed-all-btn').disabled = false;
};

window.seedAll = async function() {
  const btn = document.getElementById('seed-all-btn');
  btn.textContent = 'Seeding…';
  btn.disabled = true;
  await writeBloodBanks();
  await writeHospitals();
  log('═══ All data seeded successfully! ═══', 'ok');
  btn.textContent = '✅ Seed Complete';
  setTimeout(() => { btn.textContent = '🌱 Seed All Data (Blood Banks + Hospitals)'; btn.disabled = false; }, 3000);
};
